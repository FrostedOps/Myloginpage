<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
<h2>Login</h2>

<form id="loginForm">
<input name="username" placeholder="Username">
<input name="password" type="password" placeholder="Password">
<input type="submit" value="Login">
</form>

<button id="openModal">Register</button>
</div>

<div id="modal" class="modal">
<div class="modal-content">
<span id="close">&times;</span>

<form id="registerForm">
<input name="username" placeholder="Username">
<input name="email" placeholder="Email">
<input name="password" type="password" placeholder="Password">
<input name="reg_key" placeholder="Key">
<input type="submit" value="Register">
</form>

</div>
</div>

<script>
openModal.onclick=()=>modal.style.display="block";
close.onclick=()=>modal.style.display="none";

loginForm.onsubmit=async e=>{
e.preventDefault();
let r=await fetch("/login",{method:"POST",body:new FormData(loginForm)});
let d=await r.json();
if(d.status==="success") location="/dashboard";
};

registerForm.onsubmit=async e=>{
e.preventDefault();
await fetch("/register_user",{method:"POST",body:new FormData(registerForm)});
};
</script>

</body>
</html>
